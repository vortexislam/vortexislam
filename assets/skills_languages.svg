<svg xmlns="http://www.w3.org/2000/svg" width="260" height="242" viewBox="0 0 260 242">
<defs>
  <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#161b22;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
  </linearGradient>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect x="1" y="1" width="258" height="240" rx="12" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>
