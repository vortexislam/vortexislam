<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160">
<defs>
  <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#161b22;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
  </linearGradient>
  <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8"/>
    <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.1"/>
  </linearGradient>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Card background -->
<rect x="1" y="1" width="398" height="158" rx="12" fill="url(#cardBg)" stroke="#21262d" stroke-width="1"/>

<!-- Left accent bar -->
<rect x="1" y="12" width="3" height="136" rx="1.5" fill="#f59e0b" opacity="0.7"/>

<!-- Icon circle -->
<circle cx="30" cy="35" r="14" fill="#f59e0b" opacity="0.12"/>
<text x="30" y="40" text-anchor="middle" font-size="14">🤖</text>

<!-- Title -->
<text x="52" y="40" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Crypto Trading Bot</text>
<text x="20" y="65" font-family="'Fira Code', monospace" font-size="11" fill="#8b949e">Automated trading system with ICT/SMC strategy</text><text x="20" y="81" font-family="'Fira Code', monospace" font-size="11" fill="#8b949e">analysis, real-time Binance integration, and Telegram</text><text x="20" y="97" font-family="'Fira Code', monospace" font-size="11" fill="#8b949e">alerts</text>
<rect x="20" y="130" width="61" height="22" rx="6" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
<text x="50" y="145" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#f59e0b" opacity="0.9">Python</text>

<rect x="89.0" y="130" width="98" height="22" rx="6" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
<text x="138" y="145" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#f59e0b" opacity="0.9">Binance API</text>

<rect x="195.5" y="130" width="76" height="22" rx="6" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
<text x="234" y="145" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#f59e0b" opacity="0.9">Telegram</text>
</svg>