<svg xmlns="http://www.w3.org/2000/svg" width="740" height="280" viewBox="0 0 740 280">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#161b22"/>
    <stop offset="100%" style="stop-color:#0d1117"/>
  </linearGradient>

  <linearGradient id="borderAnim" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#00d4ff">
      <animate attributeName="offset" values="0;0.5;1;0" dur="4s" repeatCount="indefinite"/>
    </stop>
    <stop offset="50%" style="stop-color:#7c3aed">
      <animate attributeName="offset" values="0.5;1;0;0.5" dur="4s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" style="stop-color:#10b981">
      <animate attributeName="offset" values="1;0;0.5;1" dur="4s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>

  <linearGradient id="taglineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="softglow">
    <feGaussianBlur stdDeviation="1.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="740" height="280" rx="16" fill="url(#bgGrad)"/>

<!-- Animated border -->
<rect x="1" y="1" width="738" height="278" rx="15" fill="none" stroke="url(#borderAnim)" stroke-width="1.5" opacity="0.7"/>

<!-- Top accent line animated -->
<rect x="0" y="0" width="740" height="3" rx="16" fill="url(#borderAnim)" opacity="0.9"/>

<!-- Glowing dots decoration -->
<circle cx="700" cy="40" r="60" fill="#00d4ff" opacity="0.03"/>
<circle cx="40" cy="240" r="50" fill="#7c3aed" opacity="0.04"/>

<!-- Left column: Identity -->
<!-- Avatar circle with pulse -->
<circle cx="68" cy="80" r="38" fill="#161b22" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
<circle cx="68" cy="80" r="38" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4">
  <animate attributeName="r" values="38;44;38" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
</circle>
<!-- Avatar initials -->
<text x="68" y="86" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#00d4ff" text-anchor="middle" filter="url(#softglow)">IM</text>

<!-- Name -->
<text x="124" y="68" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">Islam Mustafa</text>

<!-- Role with gradient -->
<text x="124" y="92" font-family="'Fira Code', monospace" font-size="12" fill="url(#taglineGrad)">Systems Architect  ·  AI Engineer  ·  Full-Stack Dev</text>

<!-- Location badge -->
<rect x="124" y="102" width="110" height="20" rx="10" fill="#21262d" stroke="#30363d" stroke-width="0.5"/>
<text x="136" y="116" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8b949e">&#x1F1EA;&#x1F1EC;  Egypt · Cairo</text>

<!-- Divider -->
<line x1="32" y1="140" x2="708" y2="140" stroke="#21262d" stroke-width="0.8"/>

<!-- Motto -->
<text x="32" y="165" font-family="'Fira Code', monospace" font-size="11" fill="#8b949e" font-style="italic">// </text>
<text x="52" y="165" font-family="'Fira Code', monospace" font-size="11" fill="#00d4ff" font-style="italic">Automate everything. Question everything. Build relentlessly.</text>

<!-- Bottom section: 4 skill pills -->
<!-- Pill 1 -->
<rect x="32" y="185" width="158" height="30" rx="8" fill="#161b22" stroke="#00d4ff" stroke-width="0.8" opacity="0.8"/>
<text x="50" y="205" font-family="'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0">&#x1F916; Multi-Agent AI</text>

<!-- Pill 2 -->
<rect x="202" y="185" width="158" height="30" rx="8" fill="#161b22" stroke="#7c3aed" stroke-width="0.8" opacity="0.8"/>
<text x="220" y="205" font-family="'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0">&#x26A1; n8n Automation</text>

<!-- Pill 3 -->
<rect x="372" y="185" width="158" height="30" rx="8" fill="#161b22" stroke="#10b981" stroke-width="0.8" opacity="0.8"/>
<text x="390" y="205" font-family="'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0">&#x1F3D7;&#xFE0F; SaaS Platforms</text>

<!-- Pill 4 -->
<rect x="542" y="185" width="158" height="30" rx="8" fill="#161b22" stroke="#f59e0b" stroke-width="0.8" opacity="0.8"/>
<text x="560" y="205" font-family="'Segoe UI', sans-serif" font-size="12" fill="#e2e8f0">&#x1F4F1; Flutter Apps</text>

<!-- Tagline bottom -->
<text x="370" y="252" font-family="'Fira Code', monospace" font-size="11" fill="#30363d" text-anchor="middle">while (alive) { learn(); build(); ship(); }</text>

<!-- Animated cursor blink -->
<rect x="694" y="242" width="8" height="14" rx="1" fill="#00d4ff" opacity="0.8">
  <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
</rect>

</svg>